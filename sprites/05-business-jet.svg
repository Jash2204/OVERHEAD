<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- OVERHEAD sprite v2 · BUSINESS / PRIVATE JET (rear engines + T-tail) · underside, nose up -->
  <!-- Real: ~20.3 m long · 20.4 m span. Distinct silhouette, moderate frequency. -->
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6b7686"/><stop offset="0.32" stop-color="#c9d2dc"/>
      <stop offset="0.5" stop-color="#eef3f8"/><stop offset="0.68" stop-color="#c9d2dc"/><stop offset="1" stop-color="#6b7686"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7a8492"/><stop offset="0.5" stop-color="#dfe6ee"/><stop offset="1" stop-color="#7a8492"/>
    </linearGradient>
    <radialGradient id="fan"><stop offset="0" stop-color="#3a4252"/><stop offset="0.55" stop-color="#aab4c2"/><stop offset="1" stop-color="#7c8694"/></radialGradient>
    <radialGradient id="nR"><stop offset="0" stop-color="#ff8a96"/><stop offset="1" stop-color="#ff2740" stop-opacity="0"/></radialGradient>
    <radialGradient id="nG"><stop offset="0" stop-color="#9bffc9"/><stop offset="1" stop-color="#27ff7a" stop-opacity="0"/></radialGradient>
    <radialGradient id="nW"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>
  </defs>
  <g stroke="#3a4350" stroke-width="0.8" stroke-linejoin="round">
    <!-- T-tail horizontal stabilizer (wide, at extreme tail) -->
    <polygon points="120,208 88,197 88,202 120,212 152,202 152,197" fill="url(#wing)"/>
    <!-- swept wings -->
    <path d="M116,118 L32,150 L34,157 L116,135 Z" fill="url(#wing)"/>
    <path d="M124,118 L208,150 L206,157 L124,135 Z" fill="url(#wing)"/>
    <!-- rear-mounted engines + fan faces -->
    <ellipse cx="100" cy="176" rx="8" ry="14" fill="#9aa4b2"/><ellipse cx="100" cy="175" rx="5" ry="9" fill="url(#fan)"/>
    <ellipse cx="140" cy="176" rx="8" ry="14" fill="#9aa4b2"/><ellipse cx="140" cy="175" rx="5" ry="9" fill="url(#fan)"/>
    <!-- slim fuselage -->
    <path d="M120,20 C127,34 129,52 129,84 L129,190 C129,202 126,208 120,210 C114,208 111,202 111,190 L111,84 C111,52 113,34 120,20 Z" fill="url(#hull)"/>
    <!-- vertical fin edge-on leading to the T-tail -->
    <path d="M120,190 L116,208 L120,211 L124,208 Z" fill="#9fa9b6"/>
  </g>
  <g stroke="#67717e" stroke-width="0.6" opacity="0.5" fill="none">
    <line x1="120" y1="40" x2="120" y2="188"/>
    <line x1="111" y1="120" x2="129" y2="120"/>
    <rect x="114" y="118" width="5" height="8" rx="1"/><rect x="121" y="118" width="5" height="8" rx="1"/>
  </g>
  <!-- oval cabin windows hint -->
  <g fill="#90a6bd" opacity="0.7"><circle cx="120" cy="70" r="1.3"/><circle cx="120" cy="80" r="1.3"/><circle cx="120" cy="90" r="1.3"/><circle cx="120" cy="100" r="1.3"/></g>
  <path d="M115,34 Q120,30 125,34" stroke="#90a6bd" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <!-- nav lights + tail -->
  <circle cx="33" cy="153" r="9" fill="url(#nR)"/><circle cx="33" cy="153" r="2" fill="#ff3850"/>
  <circle cx="207" cy="153" r="9" fill="url(#nG)"/><circle cx="207" cy="153" r="2" fill="#3dff88"/>
  <circle cx="120" cy="212" r="8" fill="url(#nW)"/><circle cx="120" cy="212" r="1.6" fill="#fff"/>
</svg>
